<ul class="card-text font-weight-light list-group list-group-flush">
  {% for content in entry.contents %}
    <li class="list-group-item">
      <div class="row">
        {% if content.year %}
          <div class="col-xs-2 cl-sm-2 col-md-2 text-center" style="width: 60px;">
            <span class="badge font-weight-bold danger-color-dark text-uppercase align-middle" style="min-width: 60px;">{{ content.year }}</span>
          </div>
        {% endif %}
        <div class="col-xs-10 cl-sm-10 col-md-10 mt-2 mt-md-0">
          <div class="ml-1">{{ content.description }}</div>
        </div>
      </div>
    </li>
  {% endfor %}
</ul>
