
          <div class="publications">
            <!-- 置顶区：book永远第一（@book类型查询），其余pinned条目按papers.bib中的先后顺序 -->
            <div class="pinned-pubs">
              <div class="pinned-header"><i class="fas fa-thumbtack"></i> Book &amp; Survey</div>
              {% bibliography -f {{ site.scholar.bibliography }} -q @book[pinned=true] %}
              {% bibliography -f {{ site.scholar.bibliography }} -q @*[pinned=true && mark!=book] %}
            </div>

            <!-- 其余featured文章按年份倒序 -->
            {% bibliography -f {{ site.scholar.bibliography }} -q @*[selected=true] --group_by year --group_order descending %}
          </div>
